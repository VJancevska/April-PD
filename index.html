<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Homepage</title>
</head>
<body>
    <header>
        <div>
            <img src="Logo (2).png" alt="Kompānijas Logo">
            <nav aria-label="HeaderBar">
                <a href="index.html">Home</a>
                <a href="store.html">Shop</a>
            </nav>
        </div>
    </header>
    <article class="HeroSection">
        <h1>IT'S NOT JUST A WANT<br>
            IT'S A NEED</h1>
        <p>The store for all your shocking paraphernalia.</p>
        <button>SHOP NOW</button>
    </article>
    <section class="DiscountedProducts">
        <h2>DISCOUNTED PRODUCTS</h2>
        <hr></hr>
        <div class="DiscProductShowcase">
            <figure>
                <img src="RamenNoodles-removebg-preview.png" alt="Apparel with ramen noodles on it">
                <section>
                    <figcaption class="ProductCaption">Ramen Noodles Hoodie</figcaption>
                    <figcaption>
                        <span class="OldPrice">€69.69</span>
                        <span class="NewPrice">€67.67</span>
                    </figcaption>
                </section>
            </figure>
            <figure>
                <img src="CaineOutfitShowcase-removebg-preview.png" alt="Cartoon Character Cosplay">
                <section>
                    <figcaption class="ProductCaption">Dentist Outfit</figcaption>
                    <figcaption>
                        <span class="OldPrice">€1200.99</span>
                        <span class="NewPrice">€5.99</span>
                    </figcaption>
                </section>
            </figure>
            <figure>
                <img src="Squirrel.png" alt="Squirrel panties">
                <section>
                    <figcaption class="ProductCaption">Squirrel Panties</figcaption>
                    <figcaption>
                        <span class="OldPrice">€50.00</span>
                        <span class="NewPrice">€30.99</span>
                    </figcaption>
                </section>
            </figure>
            <figure>
                <img src="Alpha-removebg-preview.png" alt="An alpha wolf printed shirt">
                <section>
                    <figcaption class="ProductCaption">Alpha Wolf Shirt</figcaption>
                    <figcaption>
                        <span class="OldPrice">€19.99</span>
                        <span class="NewPrice">€14.99</span>
                    </figcaption>
                </section>
            </figure>
        </div>
    </section>
    <section class="NewArrivals">
        <h2>NEW ARRIVALS</h2>
        <hr></hr>
        <div class="NewArrivalsShowcase">
            <figure>
                <img src="MinecraftShirt.png" alt="Minecraft Shirt with a Creeper on it">
                <section>
                    <figcaption class="ProductCaption">Minecraft Creeper Shirt</figcaption>
                    <figcaption>€2000</figcaption>
                </section>
            </figure>
            <figure>
                <img src="PickleSocks.png" alt="Socks with pickles on them">
                <section>
                    <figcaption class="ProductCaption">Pickle Socks</figcaption>
                    <figcaption>€67.99</figcaption>
                </section>
            </figure>
            <figure>
                <img src="RatTop.png" alt="Top with two rats lovingly on it">
                <section>
                    <figcaption class="ProductCaption">Rat Top</figcaption>
                    <figcaption>€0.99</figcaption>
                </section>
            </figure>
            <figure>
                <img src="Skullshirt.png" alt="Shirt with a skull on it">
                <section>
                    <figcaption class="ProductCaption">Skull Shirt</figcaption>
                    <figcaption>€25.99</figcaption>
                </section>
            </figure>
        </div>
    </section>
    <footer>
        <p>
            <span id="AddressNumber">67 Rizz</span> 
            <span>Street</span>
        </p>
        <p>+1 (305) 555-0126</p>
        <p>spotify@dontsue.com</p>       
    </footer>
    <footer class="Footer2">
        <div class="FooterContainer">
            <p>67 Rizz Street, Atlanta, Georgia</p>
            <p>&copy; Spicetify</p>
        </div>
        <p>+1 (305) 555-0126</p>
    </footer>
</body>
</html>
